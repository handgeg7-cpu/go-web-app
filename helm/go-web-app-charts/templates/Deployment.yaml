# This is a sample deployment manifest file for a simple web application.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myappservice
  labels:
    app: myappservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myappservice
  template:
    metadata:
      labels:
        app: myappservice
    spec:
      containers:
      - name: myappservice
        image: "grhandge/mygowebapp:{{ .Values.image.tag }}"
        ports:
        - containerPort: 9000